<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100,400" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <title>Finanzas Personales</title>
  </head>
  <body>
    <div class="container">
        <header>
            <h1 class="text-center">Finanzas Personales</h1>
        </header>
        <section class="contenido-principal">
            <div class="row">
                <div class="col-md-5">
                    <div class="contenido primario">
                        <h2 class="text-center">Nuevo movimiento</h2>
                        <form id="agregar-movimiento" action="#">
                            <div class="form-group">
                                <label>Tipo:</label>
                                <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
                                    <label class="btn btn-outline-danger active w-50">
                                        <input type="radio" name="tipo" value="gasto" checked> Gasto
                                    </label>
                                    <label class="btn btn-outline-success w-50">
                                        <input type="radio" name="tipo" value="ingreso"> Ingreso
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="descripcion">Descripción:</label>
                                <input type="text" class="form-control" id="descripcion" placeholder="Ej: Almuerzo">
                            </div>
                            <div class="form-group">
                                <label for="monto">Monto:</label>
                                <input type="number" class="form-control" id="monto" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label for="categoria">Categoría:</label>
                                <select class="form-control" id="categoria"></select>
                            </div>
                            <div class="form-group">
                                <label for="fecha">Fecha:</label>
                                <input type="date" class="form-control" id="fecha">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Agregar</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="contenido secundario">
                        <div class="totales">
                            <div class="alert alert-success mb-2">
                                <strong>Ingresos:</strong> $ <span id="total-ingresos">0.00</span>
                            </div>
                            <div class="alert alert-danger mb-2">
                                <strong>Gastos:</strong> $ <span id="total-gastos">0.00</span>
                            </div>
                            <div id="balance-card" class="alert alert-info mb-3">
                                <strong>Balance:</strong> $ <span id="balance">0.00</span>
                            </div>
                        </div>

                        <div id="progreso-mes" class="mb-3">
                            <h5 class="text-muted text-uppercase small mb-2">Este mes por categoría <span id="progreso-mes-label" class="text-lowercase"></span></h5>
                            <div id="progreso-lista"></div>
                        </div>

                        <details class="presupuestos-config mb-3">
                            <summary class="btn btn-sm btn-outline-info">Configurar topes mensuales</summary>
                            <div class="card card-body mt-2">
                                <p class="small text-muted mb-2">Cuánto querés gastar como máximo por mes en cada categoría. Dejá en blanco o 0 para no tener tope.</p>
                                <div id="presupuestos-inputs"></div>
                            </div>
                        </details>

                        <div class="toolbar">
                            <button type="button" id="exportar" class="btn btn-outline-primary btn-sm">Exportar JSON</button>
                            <button type="button" id="importar" class="btn btn-outline-secondary btn-sm">Importar JSON</button>
                            <input type="file" id="importar-file" accept="application/json" hidden>
                        </div>

                        <div id="filtros" class="form-row">
                            <div class="form-group col-6 col-md-3">
                                <label for="filtro-desde">Desde:</label>
                                <input type="date" class="form-control form-control-sm" id="filtro-desde">
                            </div>
                            <div class="form-group col-6 col-md-3">
                                <label for="filtro-hasta">Hasta:</label>
                                <input type="date" class="form-control form-control-sm" id="filtro-hasta">
                            </div>
                            <div class="form-group col-6 col-md-3">
                                <label for="filtro-categoria">Categoría:</label>
                                <select class="form-control form-control-sm" id="filtro-categoria"></select>
                            </div>
                            <div class="form-group col-6 col-md-3">
                                <label for="filtro-tipo">Tipo:</label>
                                <select class="form-control form-control-sm" id="filtro-tipo">
                                    <option value="todos">Todos</option>
                                    <option value="ingreso">Ingresos</option>
                                    <option value="gasto">Gastos</option>
                                </select>
                            </div>
                            <div class="col-12 text-right">
                                <button type="button" id="filtro-reset" class="btn btn-link btn-sm">Limpiar filtros</button>
                            </div>
                        </div>

                        <h2 class="text-center">Movimientos</h2>
                        <div id="movimientos">
                            <ul class="list-group"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
